<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kid City USA CRM</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<!-- LOGIN -->
<div id="authShell" class="auth-shell">
  <div class="auth-card">
    <h2>Kid City USA CRM</h2>
    <p>Enter your location email</p>

    <input id="emailInput" type="email" placeholder="location@kidcityusa.com" />
    <button id="loginBtn">Continue</button>

    <div id="authMessage"></div>
  </div>
</div>

<!-- APP -->
<div id="appShell" class="app hidden">

  <header class="topbar">
    <button id="refreshBtn">Refresh</button>
    <button id="signOutBtn">Sign Out</button>
  </header>

  <div class="views">
    <div id="view-overview"></div>
    <div id="view-pipeline"></div>
    <div id="view-tours"></div>
    <div id="view-parentComms"></div>
    <div id="view-operations"></div>
    <div id="view-compliance"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
